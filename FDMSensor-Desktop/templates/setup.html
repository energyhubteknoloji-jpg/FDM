<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uygulama Kurulumu - FDMSensor</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .setup-card {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 450px;
            text-align: center;
        }
        .logo { height: 80px; margin-bottom: 20px; }
        h1 { margin-bottom: 10px; font-size: 24px; }
        p { color: #64748b; margin-bottom: 30px; font-size: 14px; }
        .options { display: grid; gap: 15px; }
        .option-btn {
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            background: none;
            width: 100%;
        }
        .option-btn:hover { border-color: var(--primary); background: #f0f9ff; }
        .option-btn.active { border-color: var(--primary); background: #f0f9ff; }
        .option-btn b { display: block; font-size: 16px; margin-bottom: 4px; }
        .option-btn span { font-size: 12px; color: #64748b; }
        
        #postgres-form { margin-top: 20px; text-align: left; display: none; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; margin-bottom: 4px; font-weight: 600; }
        input { width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        
        .btn-finish {
            margin-top: 25px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="setup-card">
        <img src="/static/logo.png" class="logo">
        <h1>Hoş Geldiniz</h1>
        <p>Uygulamayı kullanmaya başlamak için veritabanı tercihinizi yapın.</p>
        
        <div class="options">
            <button class="option-btn active" onclick="selectDB('sqlite')">
                <b>Yerel Veritabanı (SQLite)</b>
                <span>Hızlı kurulum, ayar gerektirmez. Veriler bu bilgisayarda saklanır.</span>
            </button>
            <button class="option-btn" onclick="selectDB('postgres')">
                <b>Sunucu Veritabanı (PostgreSQL)</b>
                <span>Merkezi yönetim. Veriler uzak bir sunucuda saklanır.</span>
            </button>
        </div>

        <form id="postgres-form">
            <div class="form-group"><label>Sunucu IP (Host)</label><input type="text" id="pg-host" value="localhost"></div>
            <div class="form-group"><label>Port</label><input type="number" id="pg-port" value="5432"></div>
            <div class="form-group"><label>Veritabanı Adı</label><input type="text" id="pg-name" value="fdmsensor"></div>
            <div class="form-group"><label>Kullanıcı Adı</label><input type="text" id="pg-user" value="postgres"></div>
            <div class="form-group"><label>Şifre</label><input type="password" id="pg-pass"></div>
        </form>

        <button class="btn-finish" onclick="finishSetup()">Kurulumu Tamamla</button>
    </div>

    <script>
        let selectedType = 'sqlite';

        function selectDB(type) {
            selectedType = type;
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('postgres-form').style.display = type === 'postgres' ? 'block' : 'none';
        }

        async function finishSetup() {
            const data = {
                db_type: selectedType,
                postgres: selectedType === 'postgres' ? {
                    host: document.getElementById('pg-host').value,
                    port: parseInt(document.getElementById('pg-port').value),
                    dbname: document.getElementById('pg-name').value,
                    user: document.getElementById('pg-user').value,
                    password: document.getElementById('pg-pass').value
                } : null
            };

            const response = await fetch('/api/save-config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if (response.ok) {
                window.location.href = '/login';
            } else {
                alert('Ayarlar kaydedilemedi!');
            }
        }
    </script>
</body>
</html>
